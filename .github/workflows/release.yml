name: Release

on:
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "build/**"
      - "docs/distribution.md"
      - "package.json"
      - "package-lock.json"
      - "scripts/verify-packaged-app.cjs"
      - "scripts/verify-macos-signing-env.cjs"
      - "scripts/verify-release-artifacts.cjs"
      - "scripts/verify-release-tag.cjs"
      - "src/main/**"
      - "src/preload/**"
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed tag to publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  package:
    name: Package ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-14
            command: npm run package:mac
          - platform: Windows
            os: windows-latest
            command: npm run package:win
          - platform: Linux
            os: ubuntu-latest
            command: npm run package:linux

    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - if: github.event_name != 'pull_request'
        run: npm run verify:release-tag
      - if: matrix.platform == 'macOS' && github.event_name != 'pull_request'
        run: npm run verify:macos-signing-env
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_KEYCHAIN: ${{ secrets.APPLE_KEYCHAIN }}
          APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
      - run: npm test
      - run: ${{ matrix.command }}
        env:
          APPLE_API_ISSUER: ${{ matrix.platform == 'macOS' && github.event_name != 'pull_request' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY: ${{ matrix.platform == 'macOS' && github.event_name != 'pull_request' && secrets.APPLE_API_KEY || '' }}
          APPLE_API_KEY_ID: ${{ matrix.platform == 'macOS' && github.event_name != 'pull_request' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.platform == 'macOS' && github.event_name != 'pull_request' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.platform == 'macOS' && github.event_name != 'pull_request' && secrets.APPLE_ID || '' }}
          APPLE_KEYCHAIN: ${{ matrix.platform == 'macOS' && github.event_name != 'pull_request' && secrets.APPLE_KEYCHAIN || '' }}
          APPLE_KEYCHAIN_PROFILE: ${{ matrix.platform == 'macOS' && github.event_name != 'pull_request' && secrets.APPLE_KEYCHAIN_PROFILE || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'macOS' && github.event_name != 'pull_request' && secrets.APPLE_TEAM_ID || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'macOS' && github.event_name != 'pull_request' && secrets.MACOS_CSC_KEY_PASSWORD || '' }}
          CSC_LINK: ${{ matrix.platform == 'macOS' && github.event_name != 'pull_request' && secrets.MACOS_CSC_LINK || '' }}
      - run: npm run verify:artifacts

      - name: Verify packaged app
        if: runner.os != 'Linux'
        run: npm run verify:package

      - name: Verify packaged app on Linux
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run verify:package

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: in-c-${{ runner.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub prerelease
    needs: package
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/download-artifact@v8
        with:
          pattern: in-c-*
          path: release
          merge-multiple: true

      - name: Create checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Publish prerelease
        run: |
          gh release create "$RELEASE_TAG" release/* \
            --prerelease \
            --generate-notes \
            --title "in-C ${RELEASE_TAG#v}" \
            --verify-tag
